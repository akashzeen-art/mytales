[build]
  publish = "dist"
  command = "npm run build"

# SPA redirects - serve index.html for all routes (client-side router handles /terms, /faq, etc.)
[[redirects]]
  from = "/terms"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/faq"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/features"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/stories"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/pricing"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/voice"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"